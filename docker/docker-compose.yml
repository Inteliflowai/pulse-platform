version: "3.9"

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: pulse-jellyfin
    ports:
      - "8096:8096"
      - "8920:8920"
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ./data/media:/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/System/Info/Public"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulse_node}
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulse}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  node-agent:
    build:
      context: ../apps/node-agent
    container_name: pulse-node-agent
    depends_on:
      jellyfin:
        condition: service_healthy
    env_file: .env
    ports:
      - "3100:3100"
    volumes:
      - ./data/media:/media
      - ./data/sync:/sync
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  jellyfin-adapter:
    build:
      context: ../apps/jellyfin-adapter
    container_name: pulse-jellyfin-adapter
    depends_on:
      jellyfin:
        condition: service_healthy
    env_file: .env
    ports:
      - "3101:3101"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sync-worker:
    build:
      context: ../apps/sync-worker
    container_name: pulse-sync-worker
    depends_on:
      node-agent:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
