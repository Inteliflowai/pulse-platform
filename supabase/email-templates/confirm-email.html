<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#0f1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="max-width:480px;margin:0 auto;padding:40px 24px;">
    <div style="text-align:center;margin-bottom:32px;">
      <img src="https://pulse.inteliflowai.com/pulse-logo.png" alt="Pulse" style="height:48px;width:auto;" />
    </div>

    <div style="background:#1e2130;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px;">
      <h1 style="color:#ffffff;font-size:22px;margin:0 0 8px 0;">Confirm Your Email</h1>
      <p style="color:#9ca3af;font-size:14px;line-height:1.7;margin:0 0 24px 0;">
        Welcome to Pulse! Please confirm your email address to activate your account and start using the platform.
      </p>

      <a href="{{ .ConfirmationURL }}"
         style="display:block;text-align:center;background:#6366f1;color:#ffffff;font-weight:700;font-size:14px;padding:14px 24px;border-radius:10px;text-decoration:none;margin-bottom:24px;">
        Confirm Email Address
      </a>

      <p style="color:#6b7280;font-size:12px;line-height:1.6;margin:0;">
        If you didn't create a Pulse account, you can safely ignore this email.
      </p>
    </div>

    <div style="text-align:center;margin-top:24px;">
      <p style="color:#4b5563;font-size:11px;margin:0;">
        Pulse — Learning, Delivery Infrastructure<br>
        &copy; 2026 Inteliflow AI
      </p>
    </div>
  </div>
</body>
</html>
